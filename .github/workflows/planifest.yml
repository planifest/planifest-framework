name: Planifest Strict Pipeline

on:
  pull_request:
    branches: [ main, master ]

jobs:
  validate-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Code/Doc Parity
        run: |
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          COMMIT_MESSAGES=$(git log origin/${{ github.base_ref }}...HEAD --format="%s")

          # Fast Path exemption: if all commits are fix(fast-path): only require component.yml or changelog
          FAST_PATH_COUNT=$(echo "$COMMIT_MESSAGES" | grep -cE "^fix\(fast-path\):" || true)
          TOTAL_COUNT=$(echo "$COMMIT_MESSAGES" | grep -c "." || true)

          if [ "$FAST_PATH_COUNT" -gt 0 ] && [ "$FAST_PATH_COUNT" -eq "$TOTAL_COUNT" ]; then
            if echo "$CHANGED_FILES" | grep -q "^src/"; then
              if ! echo "$CHANGED_FILES" | grep -qE "(component\.json|plan/changelog/)"; then
                echo "::error title=Planifest Fast Path Violation::Fast Path commits must update component.yml or plan/changelog/."
                exit 1
              fi
            fi
            echo "✅ Planifest fast-path pipeline passed."
            exit 0
          fi

          # Standard check
          if echo "$CHANGED_FILES" | grep -q "^src/"; then
            if ! echo "$CHANGED_FILES" | grep -qE "^(plan/|docs/|.*component\.json)"; then
              echo "::error title=Planifest Strict Violation::Code modified without corresponding updates to plan/, docs/, or component.yml."
              exit 1
            fi
          fi
          echo "✅ Planifest pipeline passed."

  validate-telemetry-schema:
    runs-on: ubuntu-latest
    # Only runs when the telemetry endpoint secret is configured (REQ-021)
    if: ${{ secrets.PLANIFEST_TELEMETRY_URL != '' }}
    steps:
      - name: Verify ship phase accepted by telemetry MCP
        env:
          PLANIFEST_TELEMETRY_URL: ${{ secrets.PLANIFEST_TELEMETRY_URL }}
        run: |
          PAYLOAD=$(node -e "
            process.stdout.write(JSON.stringify({
              schema_version: '1.0',
              event: 'phase_start',
              phase: 'ship',
              agent: 'planifest-ship-agent',
              tool: 'ci',
              model: 'ci',
              mcp_mode: 'none',
              session_id: 'ci-schema-guard',
              timestamp: new Date().toISOString(),
              data: { phase_name: 'ship' }
            }));
          ")
          HTTP_STATUS=$(curl -s -o /tmp/telemetry-response.json -w "%{http_code}" \
            -X POST "$PLANIFEST_TELEMETRY_URL/emit" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          if [ "$HTTP_STATUS" -ge 400 ]; then
            echo "::error title=Planifest Telemetry Schema Guard::MCP server rejected phase='ship' (HTTP $HTTP_STATUS). Deploy the structured-telemetry-mcp schema update before merging ship-agent (REQ-021)."
            cat /tmp/telemetry-response.json
            exit 1
          fi
          echo "✅ Telemetry schema accepts phase='ship' (HTTP $HTTP_STATUS)."
