# Planifest Component Manifest
id: "context-mode-hooks"
name: "context-mode Enforcement Hook Scripts"
feature: "0000001-context-mode-enforcement-hooks"
version: "0.1.0"
status: "active"
type: "component-pack"
domain: "developer-tooling"
summary: "Blocking PreToolUse hook scripts that enforce context-mode routing rules by intercepting Grep, Bash (pattern-matched), and WebFetch tool calls."
systemContext: "Installed into .claude/hooks/context-mode/ during setup. Invoked synchronously by Claude Code before each tool call. Returns a block decision with a ctx_* redirect when the tool violates context-mode routing rules."

responsibilities:
  - "Intercept Grep tool calls and return a block decision with redirect to ctx_execute shell"
  - "Intercept Bash tool calls matching blocked patterns (grep, rg, curl, wget, HTTP) and return a block decision with the correct ctx_* alternative"
  - "Allow Bash tool calls matching the allowlist (git, mkdir, rm, mv, cd, ls, npm install, pip install) unconditionally"
  - "Intercept WebFetch tool calls and return a block decision with redirect to ctx_fetch_and_index + ctx_search"
  - "Complete all hook execution within 50ms latency budget"

exceptions:
  - "Must NOT block the Read tool — intent indistinguishable at hook level"
  - "Must NOT block Edit or Write tools — always correct operations"
  - "Must NOT write to disk, make network calls, or read files outside of stdin input"
  - "Must NOT produce output other than the JSON decision on stdout"

stack:
  language: "bash"
  runtime: "bash"
  framework: "none"
  frontend: "none"
  styling: "none"
  componentLibrary: "none"
  database: "none"
  orm: "none"
  testing: "bash"
  iac: "none"
  cloud: "none"
  compute: "none"
  ci: "github-actions"

contract:
  apiSpec: "none"
  inputs:
    - name: "PreToolUse stdin"
      type: "stdin"
      description: "JSON object containing tool name and tool input fields, written by Claude Code before each tool invocation"
  outputs:
    - name: "PreToolUse stdout"
      type: "stdout"
      description: "JSON decision object: {hookSpecificOutput: {hookEventName: PreToolUse, permissionDecision: deny|allow, permissionDecisionReason?: string}}. Allow = exit 0 with empty stdout."
  consumedBy: []
  consumes: []
  breakingChangePolicy: "requires-human-approval"

data:
  ownsData: false
  dataContract: "none"
  tables: []
  schemaVersion: "0.0.0"
  migrationPath: "none"

scope:
  inScope:
    - "block-grep.sh — unconditional Grep block"
    - "block-bash.sh — pattern-matched Bash block with allowlist"
    - "block-webfetch.sh — unconditional WebFetch block"
  outOfScope:
    - "Hook scripts for Read, Edit, Write"
    - "Hook scripts for non-Claude Code tools"
  deferred:
    - "Configurable allowlist per project"
    - "Output-size estimation for Bash (volume-based blocking)"
    - "Windows PowerShell equivalents"

risk:
  level: "medium"
  items:
    - "Allowlist too narrow — legitimate Bash commands blocked (R-001)"
    - "Hook stdin payload may not include full tool input (R-003)"
    - "Bash shebang resolution on Windows (R-004)"

quality:
  testCoverage:
    unit: 90
    integration: 0
    e2e: 0
  techDebt: []
  quirks:
    - "jq is a required runtime dependency — no pure-bash fallback in v1 (Q-002)"
    - "Allowlist applies to leading token only — ls | grep is permitted (Q-001)"
    - "Scripts will be contributed upstream to mksglu/context-mode after this pipeline run (Q-004)"
    - "Windows requires bash-compatible environment for hook execution (Q-005)"

