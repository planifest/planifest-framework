name: Planifest Strict Pipeline

on:
  pull_request:
    branches: [ main, master ]

jobs:
  validate-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Code/Doc Parity
        run: |
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          if echo "$CHANGED_FILES" | grep -q "^src/"; then
            if ! echo "$CHANGED_FILES" | grep -qE "^(plan/|docs/|.*component\.json)"; then
              echo "::error title=Planifest Strict Violation::Code modified without corresponding updates to plan/, docs/, or component.json."
              exit 1
            fi
          fi
          echo "✅ Planifest pipeline passed."
